<section id="home">
  <img src="assets/backgrouds/background.png" (load)="show()">
  <div class="home flex" (click)="stop()">
    <div class="flex">
      <div class="text text-center">
        <span class="hello">{{showMessageHello}}</span>
        <span class="name">{{showName}}</span>
        <span class="dev">{{showMessageDeveloper}}</span>
      </div>
      <button *ngIf="showButton" class="btn btn-outline-primary btn-work" (click)="scroll('contact')" [@fadeInOut]>
        View my work <i class="fa fas fa-angle-double-right"></i>
      </button>
    </div>
  </div>
</section>
